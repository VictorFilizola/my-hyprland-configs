# --- Appearance ---
background_opacity 0.75
dynamic_background_opacity yes

# High-performance rendering for GPU
sync_to_monitor yes
repaint_delay    8
input_delay      2
scrollback_lines 10000

# --- Font & Cursor ---
# Using 'family' syntax for better compatibility with Nerd Fonts
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never

cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# --- Clipboard ---
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# Unbind defaults to prevent accidental triggers
map ctrl+shift+c no_op
map ctrl+shift+v no_op

# --- Window & Tab Management ---
# Open new windows in the current working directory
map ctrl+enter       launch --cwd=current --location=vsplit
map ctrl+shift+enter launch --cwd=current --location=hsplit

# Visual Tab Bar
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_font_style   bold
inactive_tab_font_style normal

# Moving between windows
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# Send standard xterm escape codes for Shift+Left and Shift+Right to Neovim
# map shift+left send_text all \x1b[1;2D
# map shift+right send_text all \x1b[1;2C

# --- Interaction ---
url_style curly
open_url_with default
detect_urls yes

# Ctrl+Click to open links
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link

# --- Theme ---
# BEGIN_KITTY_THEME
# VSCode_Dark
include current-theme.conf
# END_KITTY_THEME

# Block Ctrl+S/Q from being intercepted - pass through to Neovim
map ctrl+s no_op
map ctrl+q no_op
