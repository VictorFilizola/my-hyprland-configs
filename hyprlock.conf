# Colors: see ~/.config/hypr/colors.lua

  background {                                                                                                                                                                                                                                             
      path = /usr/share/wallpapers/fili-wallpapers/black-waves-wallpaper.jpg                                                                                                                                                                               
      blur_passes = 1                                                                                                                                                                                                                                      
      blur_size = 5                                                                                                                                                                                                                                        
  }                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                           
  input-field {                                                                                                                                                                                                                                            
      monitor =                                                                                                                                                                                                                                            
      size = 300, 60                                                                                                                                                                                                                                       
      outline_thickness = 2                                                                                                                                                                                                                                
      dots_size = 0.33                                                                                                                                                                                                                                     
      dots_spacing = 0.15                                                                                                                                                                                                                                  
      dots_center = true                                                                                                                                                                                                                                   
      outer_color = rgb(eb3131)                                                                                                                                                                                                                            
      inner_color = rgb(1e1e1e)                                                                                                                                                                                                                            
      font_color = rgb(ebdbb2)                                                                                                                                                                                                                             
      fade_on_empty = true                                                                                                                                                                                                                                 
      placeholder_text = <i>password...</i>                                                                                                                                                                                                                
      hide_input = false                                                                                                                                                                                                                                   
      position = 0, -80                                                                                                                                                                                                                                    
      halign = center                                                                                                                                                                                                                                      
      valign = center                                                                                                                                                                                                                                      
  }                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                           
  label {                                                                                                                                                                                                                                                  
      monitor =                                                                                                                                                                                                                                            
      text = cmd[update:3600000] date "+%H:%M"                                                                                                                                                                                                             
      color = rgb(ebdbb2)                                                                                                                                                                                                                                  
      font_size = 96                                                                                                                                                                                                                                       
      position = 0, 80                                                                                                                                                                                                                                     
      halign = center                                                                                                                                                                                                                                      
      valign = center                                                                                                                                                                                                                                      
  }      
